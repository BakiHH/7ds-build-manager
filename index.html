<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Build Wiki</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        ⚜️ 7DS Wiki
    </div>

    <input id="search" placeholder="Charakter suchen...">

    <div id="charList" class="list"></div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="tabs">
            <button class="tab active">Ausrüstung</button>
            <button class="tab">Charakter</button>
            <button class="tab">Build</button>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">

        <img id="charImg">

        <div>
            <h1 id="charName"></h1>
            <p id="charRole"></p>
        </div>

    </div>

    <!-- FILTER BAR -->
    <div class="filterbar">

        <input placeholder="Waffe / Rüstung suchen...">

        <div class="filters">
            <span>SSR</span>
            <span>SR</span>
            <span>R</span>
            <span>C</span>
        </div>

    </div>

    <!-- GRID -->
    <div class="grid">

        <div class="card">
            <h3>🎯 Gravierte Rüstung</h3>
            <p id="engraved"></p>
        </div>

        <div class="card">
            <h3>🧥 Brust</h3>
            <p id="chest"></p>
        </div>

        <div class="card">
            <h3>🦵 Beine</h3>
            <p id="legs"></p>
        </div>

        <div class="card">
            <h3>🥾 Stiefel</h3>
            <p id="boots"></p>
        </div>

        <div class="card">
            <h3>🟡 Gürtel</h3>
            <p id="belt"></p>
        </div>

        <div class="card">
            <h3>💍 Schmuck</h3>
            <p id="earrings"></p>
            <p id="necklace"></p>
            <p id="ring"></p>
        </div>

    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
