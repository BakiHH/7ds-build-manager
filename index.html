<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>7DS Origin Build Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
    <h1>⚔️ 7DS Origin Build Manager</h1>
</div>

<div class="container">

    <div class="sidebar">

        <input type="text" id="search" placeholder="Charakter suchen...">

        <select id="characterSelect"></select>

        <img id="characterImage" src="assets/placeholder.png">

        <div class="statsBox">
            <h3>Build Score</h3>
            <div id="score">0</div>
        </div>

        <button onclick="saveBuild()">💾 Speichern</button>
        <button onclick="exportBuild()">📤 Export</button>
        <input type="file" id="importFile" hidden>
        <button onclick="importFile.click()">📥 Import</button>

    </div>

    <div class="main">

        <div class="card">
            <h2>Allgemein</h2>
            <input id="role" placeholder="Rolle">
        </div>

        <div class="card">
            <h2>Waffen</h2>
            <input id="mainWeapon" placeholder="Main Weapon">
            <input id="subWeapon" placeholder="Secondary Weapon">
        </div>

        <div class="card">
            <h2>Rüstung</h2>
            <input id="chest" placeholder="Brust">
            <input id="legs" placeholder="Beine">
            <input id="boots" placeholder="Schuhe">
            <input id="belt" placeholder="Gürtel">
        </div>

        <div class="card">
            <h2>Schmuck</h2>
            <input id="earrings" placeholder="Ohrringe">
            <input id="necklace" placeholder="Halskette">
            <input id="ring" placeholder="Ring">
        </div>

        <div class="card">
            <h2>Notizen</h2>
            <textarea id="notes"></textarea>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
