<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>7DS Origin Wiki</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">⚜ 7DS ORIGIN WIKI</div>

    <input id="search" placeholder="Charakter suchen...">

    <div id="list"></div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <img id="img">
        <div>
            <h1 id="name"></h1>
            <p id="role"></p>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <!-- GRID -->
    <div class="grid">

        <div class="card glow">
            <h3>🎯 Gravierte Rüstung</h3>
            <p id="engraved"></p>
        </div>

        <div class="card">
            <h3>🧥 Brust</h3>
            <p id="chest"></p>
        </div>

        <div class="card">
            <h3>🦵 Beine</h3>
            <p id="legs"></p>
        </div>

        <div class="card">
            <h3>🥾 Stiefel</h3>
            <p id="boots"></p>
        </div>

        <div class="card">
            <h3>🟡 Gürtel</h3>
            <p id="belt"></p>
        </div>

        <div class="card">
            <h3>💍 Schmuck</h3>
            <p>Ohrringe: <span id="earrings"></span></p>
            <p>Halskette: <span id="necklace"></span></p>
            <p>Ring: <span id="ring"></span></p>
        </div>

        <div class="card full">
            <h3>📜 Beschreibung</h3>
            <p id="notes"></p>
        </div>

    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
