<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>7DS Origin Wiki</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-overlay"></div>

<div class="layout">

<!-- LEFT SIDEBAR -->
<div class="sidebar">
    <h2>📖 Charaktere</h2>
    <input id="search" placeholder="Suchen...">
    <div id="charList"></div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <div class="header">
        <img id="charImg">
        <div>
            <h1 id="charName"></h1>
            <p id="charRole"></p>
        </div>
    </div>

    <div class="grid">

        <div class="card"><h3>🎯 Gravierte Rüstung</h3><p id="engraved"></p></div>
        <div class="card"><h3>🧥 Brust</h3><p id="chest"></p></div>
        <div class="card"><h3>🦵 Beine</h3><p id="legs"></p></div>
        <div class="card"><h3>🥾 Stiefel</h3><p id="boots"></p></div>
        <div class="card"><h3>🟡 Gürtel</h3><p id="belt"></p></div>
        <div class="card"><h3>💍 Ohrringe</h3><p id="earrings"></p></div>
        <div class="card"><h3>📿 Halskette</h3><p id="necklace"></p></div>
        <div class="card"><h3>💍 Ring</h3><p id="ring"></p></div>

        <div class="card full">
            <h3>📜 Build Beschreibung</h3>
            <p id="notes"></p>
        </div>

    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
